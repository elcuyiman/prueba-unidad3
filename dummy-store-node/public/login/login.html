<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="/shared/shared.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="site-header">
        <div class="logo">Dummy Store</div>
        <div class="user-controls">
            <a href="/welcome/welcome.html">Volver</a>
        </div>
    </header>

    <main class="site-main">
        <div class="form-container">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" autocomplete="username">
                    <span class="error-message" id="errorUsername"></span>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" autocomplete="current-password">
                    <span class="error-message" id="errorPassword"></span>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Entrar</button>
            </form>
            <p class="switch-link">¿No tienes cuenta? <a href="/register/register.html">Regístrate aquí</a></p>
        </div>
    </main>

    <footer class="site-footer">Dummy Store &copy; 2026</footer>

    <script src="login.js"></script>
</body>
</html>
