<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Store - Registro</title>
    <link rel="stylesheet" href="/shared/shared.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <header class="site-header">
        <div class="logo">Dummy Store</div>
        <div class="user-controls">
            <a href="/welcome/welcome.html">Volver</a>
        </div>
    </header>

    <main class="site-main">
        <div class="form-container">
            <h2>Crear Cuenta</h2>
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" autocomplete="off">
                    <span class="error-message" id="errorUsername"></span>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email">
                    <span class="error-message" id="errorEmail"></span>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password">
                    <span class="error-message" id="errorPassword"></span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword">
                    <span class="error-message" id="errorConfirmPassword"></span>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Registrarse</button>
            </form>
            <p class="switch-link">¿Ya tienes cuenta? <a href="/login/login.html">Inicia sesión aquí</a></p>
        </div>
    </main>

    <footer class="site-footer">Dummy Store &copy; 2026</footer>

    <script src="register.js"></script>
</body>
</html>
